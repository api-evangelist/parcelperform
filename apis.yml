aid: parcelperform
url: https://raw.githubusercontent.com/api-evangelist/parcelperform/refs/heads/main/apis.yml
name: Parcel Perform
kind: company
description: Parcel Perform is a Singapore-headquartered Data & Delivery Experience
  Platform that aggregates real-time tracking data across hundreds of carriers
  worldwide into one standardized event model, then layers post-purchase tracking
  pages, proactive notifications, logistics performance analytics, and returns
  management on top. The Parcel Perform API (developer portal at
  developer.parcelperform.com) lets merchants and platforms create and retrieve
  shipments and their tracking events, manage returns, and receive outgoing
  webhooks for tracking-status changes, authenticated with OAuth2 client-credentials
  bearer tokens.
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
- Logistics
- Shipment Tracking
- Post-Purchase
- Delivery Experience
- Returns
- E-Commerce
created: '2026-07-03'
modified: '2026-07-03'
specificationVersion: '0.19'
apis:
- aid: parcelperform:parcelperform-shipments-api
  name: Parcel Perform Shipments API
  tags:
  - Shipments
  - Tracking
  - Carriers
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.parcelperform.com/docs/api-guides-reference/5unzr17vbxlxd-list-shipments
  baseURL: https://api.parcelperform.com/v5
  properties:
  - url: https://developers.parcelperform.com/docs/api-guides-reference/8e768e6831f6c-overview
    type: Documentation
  - url: https://developers.parcelperform.com/docs/api-guides-reference/6f5f7fedef593-create-a-shipment
    type: APIReference
  - url: openapi/parcelperform-openapi.yml
    type: OpenAPI
  description: Create, retrieve, list, and update shipments in a Parcel Perform
    account. A shipment carries the carrier/courier code, tracking number, sender
    and recipient details, and (in the v5.2.0 response) related returns, rating,
    line item, and collection point objects. This is the system of record that
    ties a merchant order to a trackable parcel across Parcel Perform's carrier
    network.
- aid: parcelperform:parcelperform-tracking-events-api
  name: Parcel Perform Tracking Events API
  tags:
  - Tracking
  - Events
  - Milestones
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.parcelperform.com/docs/api-guides-reference/ee4c914fc83bf-create-events-for-an-existing-shipment
  baseURL: https://api.parcelperform.com/v5
  properties:
  - url: https://www.parcelperform.com/insights/tracking-api
    type: Documentation
  - url: https://developers.parcelperform.com/docs/api-guides-reference/blfc895yi4bx3-create-events
    type: APIReference
  - url: openapi/parcelperform-openapi.yml
    type: OpenAPI
  description: Retrieve the normalized tracking event timeline captured for a
    shipment, or manually create events on an existing outbound or return
    shipment. Parcel Perform standardizes carrier-specific status codes from its
    carrier network into a single event and milestone model (with location and
    timestamp) so consuming applications don't have to parse each carrier's raw
    tracking feed themselves.
- aid: parcelperform:parcelperform-returns-api
  name: Parcel Perform Returns API
  tags:
  - Returns
  - Reverse Logistics
  - RMA
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.parcelperform.com/docs/api-guides-reference/3d66ap56pfly7-create-return
  baseURL: https://api.parcelperform.com/v5
  properties:
  - url: https://developers.parcelperform.com/docs/api-guides-reference/1bd1a948e1eb3-create-a-return
    type: APIReference
  - url: openapi/parcelperform-openapi.yml
    type: OpenAPI
  description: Create a return, or create a return together with its associated
    return shipment, in a Parcel Perform account (one return per request). Return
    shipments flow through the same shipment and tracking-event model as outbound
    parcels, giving merchants a single system for forward and reverse logistics
    visibility.
- aid: parcelperform:parcelperform-webhooks-api
  name: Parcel Perform Webhooks API
  tags:
  - Webhooks
  - Notifications
  - Outgoing Webhooks
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developers.parcelperform.com/docs/api-guides-reference/e8adbc8a2da19-outgoing-webhooks-version-5-format
  baseURL: https://api.parcelperform.com/v5
  properties:
  - url: https://developers.parcelperform.com/docs/api-guides-reference/ba66787fe87e7-outgoing-webhooks-version-5-2-0-format
    type: Documentation
  - url: https://developers.parcelperform.com/docs/api-guides-reference/e8adbc8a2da19-outgoing-webhooks-version-5-format
    type: APIReference
  - url: openapi/parcelperform-openapi.yml
    type: OpenAPI
  description: Register a callback URL to automatically receive Shipment Tracking
    Update events as outgoing webhooks whenever Parcel Perform ingests a new
    carrier tracking event, in either the v5.0.0 or v5.2.0 payload format. This
    is Parcel Perform's push notification surface - there is no public WebSocket
    or streaming endpoint.
- aid: parcelperform:parcelperform-couriers-api
  name: Parcel Perform Couriers API
  tags:
  - Couriers
  - Carriers
  - Reference Data
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.parcelperform.com/integrations/carriers
  baseURL: https://api.parcelperform.com/v5
  properties:
  - url: https://www.parcelperform.com/integrations/carriers
    type: Documentation
  - url: openapi/parcelperform-openapi.yml
    type: OpenAPI
  description: Modeled reference-data surface for the carrier/courier network
    Parcel Perform aggregates - reported between roughly 900 and 1,000+ carriers
    worldwide, added weekly, each identified by a courier code used on shipment
    creation. Parcel Perform publishes a marketing directory of supported
    carriers, but the public API Guides & Reference does not document a
    standalone GET /couriers list endpoint as of this review; carrier codes are
    otherwise surfaced only as a field on Shipment resources, so the endpoints
    below are modeled rather than confirmed.
- aid: parcelperform:parcelperform-analytics-api
  name: Parcel Perform Analytics API
  tags:
  - Analytics
  - Insights
  - Performance
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.parcelperform.com/products/analyze
  baseURL: https://api.parcelperform.com/v5
  properties:
  - url: https://www.parcelperform.com/products/analyze
    type: Documentation
  - url: openapi/parcelperform-openapi.yml
    type: OpenAPI
  description: Modeled reporting surface behind Parcel Perform's Analyze product,
    which turns aggregated delivery-experience data (carrier SLA/on-time
    performance, exception rates, estimated-delivery-date accuracy) into
    dashboards and AI-generated insights. Analyze is documented as a product
    within the Parcel Perform app, not as a standalone endpoint set in the public
    API Guides & Reference, so the endpoints below are modeled on the metrics the
    product describes rather than confirmed against a published reference.
