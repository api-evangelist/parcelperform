publisherName: Parcel Perform
serviceCategory: Logistics and Delivery Experience
billingModel:
  pricingCategory: Contract (Enterprise)
  billingFrequency: Annual
  billingCurrency: USD
  chargeCategories:
  - Purchase
  - Usage
  - Adjustment
focusColumns:
  ServiceName: Parcel Perform
  ServiceCategory: Logistics and Delivery Experience
  ProviderName: Parcel Perform
  PublisherName: Parcel Perform
  InvoiceIssuerName: Parcel Perform
  BillingCurrency: USD
  ChargeCategory: Purchase
  PricingCategory: Contract (Enterprise)
meters:
- name: shipments_tracked
  description: Outbound and return shipments created/tracked through the platform, the primary volume driver behind enterprise contract tiers.
  unit: shipments
  aggregation: sum
  dimensions:
  - account
  - courier
- name: returns_processed
  description: Returns created through the Returns API or portal.
  unit: returns
  aggregation: sum
  dimensions:
  - account
- name: webhook_events_delivered
  description: Outgoing Shipment Tracking Update webhook events delivered to subscribed endpoints.
  unit: events
  aggregation: sum
  dimensions:
  - account
  - subscription
- name: carrier_integrations
  description: Number of distinct carrier/courier integrations active on the account, a common contract-tier input.
  unit: carriers
  aggregation: count
  dimensions:
  - account
principles:
- name: Visibility
  description: Track monthly shipment, return, and webhook-event volume against the contracted allowance to anticipate renewal-time tier changes.
- name: Allocation
  description: Tag shipments with merchant/brand or business-unit reference numbers so tracking volume maps to internal cost centers.
- name: Optimization
  description: Consolidate webhook subscriptions and filter unneeded carrier integrations to avoid paying for coverage that isn't used.
- name: Accountability
  description: Assign an owner for the Parcel Perform commercial relationship and review usage against contract terms at renewal.
maintainers:
