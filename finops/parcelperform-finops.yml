providerId: parcelperform
created: '2026-07-03'
modified: '2026-07-03'
reconciled: false
tags:
- Logistics
- Shipment Tracking
- Post-Purchase
- FinOps
- Cost Management
- FOCUS
description: >-
  FinOps view of Parcel Perform spend. Parcel Perform is sold as an enterprise
  SaaS contract rather than metered self-serve usage, so the dominant cost
  lever is the negotiated annual agreement (scoped by parcel volume, carrier
  integrations, and product modules) rather than a per-call API price. Within
  that contract, the operational cost drivers that show up in shipment volume
  are the number of shipments/returns created and tracked, and the number of
  outgoing webhook subscriptions/events consumed.
notes: >-
  No public per-unit rates are available to reconcile against FOCUS columns;
  actual invoiced amounts and any usage-based true-ups should be obtained from
  the Parcel Perform commercial agreement.
sources:
- https://www.parcelperform.com/
- https://resources.parcelperform.com/contact
- https://focus.finops.org/focus-specification/v1-3/
