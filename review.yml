aid: parcelperform
name: Parcel Perform
review:
  question: Does Parcel Perform expose a documented public WebSocket API?
  answer: false
  date: '2026-07-03'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: |
    No AsyncAPI document was authored. Parcel Perform's own public API surface
    (shipments, tracking events, returns) is request/response REST over HTTPS;
    the only server-initiated transport documented is outgoing webhooks, which
    are server-to-endpoint HTTP POST callbacks, not a streaming protocol.
    There is no Server-Sent Events (SSE) surface documented on Parcel
    Perform's own API either, so under the current AsyncAPI scope (SSE and
    WebSocket in scope, plain webhook POSTs out of scope) there is nothing on
    Parcel Perform's own API to model in AsyncAPI.
findings:
  summary: |
    Parcel Perform does not publish a documented public WebSocket API.
    Parcel Perform is a tracking-aggregation and delivery-experience platform
    that ingests carrier tracking feeds, normalizes them into a single event
    model, and exposes them through a REST API (base
    https://api.parcelperform.com, currently at v5/v5.2.0) authenticated with
    an OAuth2 client-credentials Bearer token obtained from
    https://api.parcelperform.com/auth/oauth/token/. Consumers create and
    retrieve shipments, retrieve/create tracking events, and create returns
    over plain HTTPS request/response calls. Real-time delivery of tracking
    updates to consumers is handled via Outgoing Webhooks (documented in both
    a v5.0.0 and a v5.2.0 payload format) - the platform pushes an HTTP POST
    to a merchant-registered callback URL when a new tracking event is
    ingested. No realtime, bidirectional, or streaming WebSocket (ws:// or
    wss://) endpoint, and no Server-Sent Events (SSE) stream, is documented
    anywhere in Parcel Perform's public API Guides & Reference as of the
    review date.
  accessNote: |
    Parcel Perform's developer portal (developer.parcelperform.com, hosted on
    Stoplight at developers.parcelperform.com) renders its reference pages
    client-side via JavaScript. Programmatic fetching returned only page
    titles/navigation chrome rather than full body content, so this review
    relied on documentation page titles, indexed search-result snippets, and
    third-party integration guides (e.g. Solvemate's Postman walkthrough) to
    confirm which operations exist and how authentication works, rather than
    reading literal request/response schemas off the rendered page. This is
    reflected in the OpenAPI document, which marks most paths and all schemas
    as modeled rather than confirmed.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.parcelperform.com/v5
      documented: true
      note: Shipments, tracking events, and returns are managed via request/response REST.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Outgoing Shipment Tracking Update webhooks POST to a merchant-registered HTTPS callback URL, in v5.0.0 or v5.2.0 payload format. Server-to-endpoint HTTP, not WebSocket.
    - protocol: SSE
      scheme: https
      documented: false
      note: No Server-Sent Events stream is documented on Parcel Perform's own API.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented anywhere in Parcel Perform's API Guides & Reference as of the review date.
  endpointsConfirmed:
    - description: Base API domain confirmed verbatim via indexed documentation and third-party integration guides.
      value: https://api.parcelperform.com
    - description: OAuth2 client-credentials token endpoint, path confirmed verbatim.
      value: POST https://api.parcelperform.com/auth/oauth/token/
    - description: Shipment details path fragment confirmed verbatim (trailing identifier segment modeled).
      value: GET https://api.parcelperform.com/v5/shipment/details/...
    - description: Documented operation (title confirmed); exact path/schema modeled in openapi/parcelperform-openapi.yml.
      value: Create a Shipment (POST)
    - description: Documented operation (title confirmed); exact path/schema modeled.
      value: List Shipments (v5.0)
    - description: Documented operation (title confirmed); exact path/schema modeled.
      value: Update Shipment (v5.0) / Update Details for an Existing Shipment
    - description: Documented operation (title confirmed); exact path/schema modeled.
      value: Create Events for an Existing Shipment / Create Events (v5.0)
    - description: Documented operation (title confirmed); exact path/schema modeled.
      value: Create a Return / Create Return
    - description: Documented payload formats (titles confirmed); subscription-management path modeled.
      value: Outgoing Webhooks (Version 5.0.0 Format) and (Version 5.2.0 Format)
  endpointsModeled:
    - POST https://api.parcelperform.com/v5/shipment
    - GET  https://api.parcelperform.com/v5/shipment/list
    - PUT  https://api.parcelperform.com/v5/shipment/details/{tracking_id}
    - POST https://api.parcelperform.com/v5/shipment/{tracking_id}/event
    - POST https://api.parcelperform.com/v5/return
    - POST https://api.parcelperform.com/v5/return/shipment
    - GET  https://api.parcelperform.com/v5/webhook
