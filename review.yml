actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: |
    No WebSocket or SSE protocol surface exists on Parcel Perform's own API.
    Real-time delivery to consumers is handled by outgoing webhook POST
    callbacks, which are out of scope for an AsyncAPI document under current
    scope rules. No AsyncAPI document was created.
